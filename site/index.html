<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>自测题库中心</title>
  <style>
    :root {
      --bg: #f6f2e8;
      --panel: #fffdfa;
      --ink: #1e2528;
      --muted: #617071;
      --line: #ddd5c5;
      --brand: #0e7c74;
      --brand-dark: #075f5a;
      --accent: #bf3f39;
      --gold: #b58627;
      --ok: #1d7a50;
      --warn: #a56800;
      --bad: #b73737;
      --shadow: 0 18px 48px rgba(49, 45, 36, .12);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(rgba(246, 242, 232, .94), rgba(246, 242, 232, .98)),
        repeating-linear-gradient(0deg, transparent 0 30px, rgba(181, 134, 39, .08) 30px 31px),
        repeating-linear-gradient(90deg, transparent 0 30px, rgba(14, 124, 116, .06) 30px 31px);
    }

    button,
    textarea,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 22px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .hero-main,
    .toolbar,
    .question-card,
    .side-panel {
      border: 1px solid var(--line);
      background: rgba(255, 253, 250, .92);
      box-shadow: var(--shadow);
      border-radius: 8px;
    }

    .hero-main {
      padding: 26px;
      display: grid;
      gap: 18px;
      min-height: 220px;
    }

    .eyebrow {
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.8;
    }

    .hero-actions,
    .card-actions,
    .filter-row,
    .score-strip,
    .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 10px;
    }

    .filter-group > span {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .primary-btn,
    .secondary-btn,
    .ghost-btn,
    .icon-btn {
      min-height: 40px;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .primary-btn {
      padding: 0 16px;
      color: #fff;
      background: var(--brand);
      font-weight: 800;
    }

    .primary-btn:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .secondary-btn,
    .ghost-btn,
    .icon-btn {
      padding: 0 13px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
    }

    .secondary-btn:hover,
    .ghost-btn:hover,
    .icon-btn:hover {
      border-color: var(--brand);
      transform: translateY(-1px);
    }

    .primary-btn:disabled,
    .secondary-btn:disabled,
    .ghost-btn:disabled,
    .icon-btn:disabled {
      cursor: not-allowed;
      opacity: .48;
      transform: none;
    }

    .ghost-btn.active {
      color: #fff;
      border-color: var(--brand);
      background: var(--brand);
    }

    .icon-btn {
      width: 40px;
      padding: 0;
    }

    .import-control {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 7px 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .import-control select {
      min-height: 30px;
      border: 0;
      background: transparent;
      color: var(--brand-dark);
      font: inherit;
      font-weight: 900;
    }

    .import-control .secondary-btn {
      min-height: 30px;
      padding: 0 10px;
    }

    .bank-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(255, 255, 255, .78);
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .bank-switch select {
      max-width: min(360px, 58vw);
      min-height: 30px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-weight: 900;
    }

    .bank-switch select:focus {
      outline: 2px solid rgba(14, 124, 116, .22);
      border-radius: 5px;
    }

    .study-board {
      position: relative;
      overflow: hidden;
      min-height: 220px;
      padding: 20px;
      border: 1px solid #d5ccba;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(14, 124, 116, .14), transparent 42%),
        linear-gradient(45deg, rgba(191, 63, 57, .13), transparent 38%),
        #fffaf1;
      box-shadow: var(--shadow);
    }

    .mini-notes {
      position: absolute;
      inset: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: 58px;
      gap: 12px;
      transform: rotate(-3deg);
    }

    .note {
      border-radius: 6px;
      border: 1px solid rgba(30, 37, 40, .12);
      background: #fff;
      box-shadow: 0 10px 22px rgba(40, 35, 25, .1);
      padding: 12px;
    }

    .note::before,
    .note::after {
      content: "";
      display: block;
      height: 7px;
      border-radius: 999px;
      background: rgba(14, 124, 116, .24);
      margin-bottom: 9px;
    }

    .note::after {
      width: 62%;
      background: rgba(191, 63, 57, .22);
    }

    .note:nth-child(2),
    .note:nth-child(3) {
      transform: translateY(14px);
    }

    .hero-stats {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      border: 1px solid rgba(255, 255, 255, .72);
      border-radius: 7px;
      background: rgba(255, 253, 250, .86);
      padding: 10px;
      backdrop-filter: blur(5px);
    }

    .stat strong {
      display: block;
      font-size: 23px;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      gap: 14px;
      padding: 14px;
      margin-bottom: 18px;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
    }

    .search-input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 14px;
      background: #fff;
      color: var(--ink);
    }

    .search-input:focus,
    textarea:focus {
      outline: 3px solid rgba(14, 124, 116, .18);
      border-color: var(--brand);
    }

    .progress-track {
      height: 9px;
      border-radius: 999px;
      background: #e8dfcf;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--gold));
      transition: width .25s ease;
    }

    .layout {
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .question-list {
      display: grid;
      gap: 14px;
    }

    .practice-tools[hidden] {
      display: none;
    }

    .practice-action[hidden] {
      display: none;
    }

    .home-panel {
      display: grid;
      gap: 14px;
      padding: 22px;
    }

    .home-panel h2 {
      font-size: 26px;
    }

    .home-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .bank-list {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .bank-source-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bank-source-tabs .ghost-btn {
      min-height: 34px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .bank-section {
      display: grid;
      gap: 8px;
    }

    .bank-section[hidden] {
      display: none;
    }

    .bank-section-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .home-bank-grid {
      display: grid;
      gap: 16px;
      margin-top: 4px;
    }

    .bank-section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .bank-card {
      display: grid;
      width: 100%;
      gap: 5px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      text-align: left;
    }

    .bank-card:hover,
    .bank-card.active {
      border-color: var(--brand);
      background: rgba(14, 124, 116, .07);
    }

    .bank-card strong {
      font-size: 14px;
      line-height: 1.45;
    }

    .bank-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .bank-card-source {
      width: fit-content;
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(14, 124, 116, .09);
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 900;
    }

    .bank-card.large {
      min-height: 128px;
      padding: 16px;
      align-content: start;
    }

    [data-mode="home"] .practice-side-block {
      display: none;
    }

    .mode-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 14px;
      border: 1px solid rgba(14, 124, 116, .22);
      border-radius: 8px;
      background: rgba(14, 124, 116, .07);
      color: var(--muted);
      line-height: 1.6;
    }

    .mode-banner strong {
      color: var(--brand-dark);
    }

    .question-pager {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pager-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
    }

    .pager-count {
      color: var(--ink);
      font-weight: 900;
    }

    .pager-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .question-card {
      padding: 18px;
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .question-title {
      display: grid;
      gap: 6px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.4;
      letter-spacing: 0;
    }

    .chip {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(14, 124, 116, .11);
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 800;
    }

    .question-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip.muted {
      background: #f2ecdf;
      color: var(--muted);
    }

    .question-type-badge {
      background: rgba(191, 63, 57, .1);
      color: var(--accent);
    }

    .status-pill {
      min-width: 78px;
      text-align: center;
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--muted);
      background: #f2ecdf;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status-pill.good {
      color: var(--ok);
      background: rgba(29, 122, 80, .11);
    }

    .status-pill.almost {
      color: var(--warn);
      background: rgba(165, 104, 0, .13);
    }

    .status-pill.bad {
      color: var(--bad);
      background: rgba(183, 55, 55, .11);
    }

    .prompt {
      color: var(--muted);
      margin: 0 0 12px;
      line-height: 1.7;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 118px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 13px 14px;
      background: #fff;
      color: var(--ink);
      line-height: 1.75;
    }

    .card-actions {
      margin-top: 12px;
    }

    .feedback {
      display: none;
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .feedback.visible {
      display: grid;
      gap: 12px;
    }

    .score-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 7px;
      background: #f7f1e6;
      color: var(--muted);
    }

    .score-line strong {
      color: var(--ink);
    }

    .keyword-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword-details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
      color: var(--muted);
    }

    .keyword-details summary {
      cursor: pointer;
      font-weight: 800;
      color: var(--ink);
    }

    .keyword-details .keyword-grid {
      margin-top: 10px;
    }

    .feedback-panels {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .feedback-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      min-height: 92px;
    }

    .feedback-title {
      margin: 0 0 8px;
      font-weight: 900;
      color: var(--ink);
    }

    .feedback-title.good {
      color: var(--ok);
    }

    .feedback-title.bad {
      color: var(--bad);
    }

    .feedback-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.75;
    }

    .keyword {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
    }

    .keyword.hit {
      border-color: rgba(29, 122, 80, .35);
      background: rgba(29, 122, 80, .1);
      color: var(--ok);
    }

    .keyword.miss {
      border-color: rgba(183, 55, 55, .32);
      background: rgba(183, 55, 55, .09);
      color: var(--bad);
    }

    .choice-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .choice-option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    .choice-option.selected {
      border-color: rgba(14, 124, 116, .48);
      background: rgba(14, 124, 116, .09);
    }

    .choice-label {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: #f2ecdf;
      color: var(--brand-dark);
      font-weight: 900;
    }

    .choice-text {
      line-height: 1.6;
    }

    .answer-box {
      display: none;
      padding: 13px 14px;
      border: 1px solid rgba(14, 124, 116, .24);
      border-radius: 7px;
      background: rgba(14, 124, 116, .07);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .answer-box.visible {
      display: block;
    }

    .side-panel {
      position: sticky;
      top: 104px;
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .side-panel h3 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .mini-metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .mini-metric:last-child {
      border-bottom: 0;
    }

    .mini-metric strong {
      color: var(--ink);
    }

    .review-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }

    .question-mini-list {
      display: flex;
      align-items: center;
      align-content: flex-start;
      gap: 8px;
      flex-wrap: wrap;
      max-height: 170px;
      overflow: auto;
    }

    .question-mini-item {
      width: 34px;
      height: 34px;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
    }

    .question-mini-item.active,
    .question-mini-item:hover {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(14, 124, 116, .14);
    }

    .question-mini-item.good {
      border-color: #39845d;
      background: rgba(57, 132, 93, .14);
      color: #2f7a54;
    }

    .question-mini-item.bad,
    .question-mini-item.almost {
      border-color: var(--danger);
      background: rgba(191, 63, 57, .13);
      color: var(--danger);
    }

    .review-item {
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--muted);
      background: #fff;
      text-align: left;
    }

    .review-item strong {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.35;
    }

    .empty {
      color: var(--muted);
      line-height: 1.7;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 920px) {
      .hero,
      .layout {
        grid-template-columns: 1fr;
      }

      .feedback-panels {
        grid-template-columns: 1fr;
      }

      .side-panel {
        position: static;
        order: -1;
        gap: 10px;
      }

      .side-panel h3,
      .side-summary,
      .review-list {
        display: none;
      }

      .bank-list {
        margin-bottom: 0;
      }

      .toolbar {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      .hero-main,
      .question-card {
        padding: 16px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .filter-group {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .hero-actions,
      .card-actions,
      .filter-row {
        align-items: stretch;
      }

      .primary-btn,
      .secondary-btn,
      .ghost-btn,
      .import-control,
      .bank-switch {
        width: 100%;
      }

      .import-control {
        display: grid;
        grid-template-columns: auto 1fr;
      }

      .import-control .secondary-btn {
        grid-column: 1 / -1;
        width: 100%;
      }

      .bank-switch select {
        max-width: none;
        width: 100%;
      }

      .question-head {
        display: grid;
      }

      .status-pill {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="hero" aria-labelledby="pageTitle">
      <div class="hero-main">
        <div class="eyebrow">闭卷默写自测</div>
        <h1 id="pageTitle">自测题库中心</h1>
        <p>先从侧栏选择一个题库，再进入默写和判分。默认题库已经拆成独立文件，后续可以继续加入更多科目题库。</p>
        <div class="hero-actions">
          <button class="primary-btn practice-action" id="submitAll" type="button" title="判分全部题目" hidden>交卷判分</button>
          <button class="secondary-btn practice-action" id="focusMissed" type="button" title="只显示未掌握题目" hidden>错题回看</button>
          <button class="secondary-btn practice-action" id="expandToggle" type="button" title="切换单题/整体展开" hidden>整体展开</button>

          <p>题库会从独立文件加载。你也可以导入自己的 JSON 题库，导入后它会出现在左侧和下方题库列表里。</p>

  <script>
    const categoryLabels = {
      all: "全部",
      term: "名词解释",
      short: "简答题",
      quick: "选择判断",
      choice: "选择题",
      singleChoice: "单选题",
      multipleChoice: "多选题",
      formula: "计算公式",
      case: "案例题",
      custom: "自定义"
    };

    const categoryAliases = {
      term: "term",
      "名词解释": "term",
      short: "short",
      "简答题": "short",
      "问答题": "short",
      choice: "choice",
      "选择题": "choice",
      singleChoice: "singleChoice",
      "单选题": "singleChoice",
      multipleChoice: "multipleChoice",
      "多选题": "multipleChoice",
      quick: "quick",
      "选择判断": "quick",
      "判断题": "quick",
      "选择/判断": "quick",
      formula: "formula",
      "计算公式": "formula",
      "计算题": "formula",
      "公式题": "formula",
      case: "case",
      "案例题": "case",
      custom: "custom",
      "自定义": "custom",
      auto: "custom",
      "自动识别": "custom"
    };

    const questionBankStorageKey = "enterprise-management-question-bank-v2";
    const storageKey = "enterprise-management-self-test-v1";
    const bankLibraryStorageKey = "enterprise-management-bank-library-v1";
    const builtInBankManifestUrl = "./banks/manifest.json";

    const defaultBankTitle = "自测题库";
    const defaultBankId = "bank-default";
    const bankSourceLabels = {
      "built-in": "内置题库",
      local: "本地题库",
      shared: "云端候选"
    };
    let activeBankSourceFilter = "built-in";
    let bankLibrary = loadBankLibrary();
    let activeBankId = "";
    let activeBank = getActiveBank();
    let bankTitle = "";
    let questions = [];
    let currentView = "home";

    const state = createEmptyPracticeState(questions);

    const els = {
      list: document.querySelector("#questionList"),
      chapterFilterRow: document.querySelector("#chapterFilterRow"),
      filterRow: document.querySelector("#filterRow"),
      search: document.querySelector("#searchInput"),
      bankList: document.querySelector("#bankList"),
      homeBankGrid: document.querySelector("#homeBankGrid"),
      practiceTools: document.querySelector("#practiceTools"),
      pageTitle: document.querySelector("#pageTitle"),
      progress: document.querySelector("#progressFill"),
      heroTotal: document.querySelector("#heroTotal"),
      heroDone: document.querySelector("#heroDone"),
      heroScore: document.querySelector("#heroScore"),
      filledCount: document.querySelector("#filledCount"),
      checkedCount: document.querySelector("#checkedCount"),
      totalScore: document.querySelector("#totalScore"),
      goodCount: document.querySelector("#goodCount"),
      weakCount: document.querySelector("#weakCount"),
      questionMiniList: document.querySelector("#questionMiniList"),
      reviewList: document.querySelector("#reviewList"),
      practiceActions: document.querySelectorAll(".practice-action")
    };

    function deriveKeywords(answer) {
      return answerUnits({ answer })
        .flatMap((unit) => unit.split(/、|，|,|；|;|。|\n|和|与|及|或/))
        .map((item) => item.trim())
        .filter((item) => normalize(item).length >= 2)
        .slice(0, 10);
    }

    function normalizeChoiceOptions(rawOptions) {
      if (!Array.isArray(rawOptions)) return [];
      return rawOptions
        .map((option, index) => {
          if (typeof option === "string") {
            const match = option.match(/^\s*([A-Z])[\.\、．:：\s]+([\s\S]*)$/i);
            return {
              label: (match?.[1] || String.fromCharCode(65 + index)).toUpperCase(),
              text: (match?.[2] || option).trim()
            };
          }
          if (option && typeof option === "object") {
            return {
              label: String(option.label || option.key || String.fromCharCode(65 + index)).trim().toUpperCase(),
              text: String(option.text || option.value || option.content || "").trim()
            };
          }
          return null;
        })
        .filter((option) => option?.label && option?.text);
    }

    function isChoiceQuestion(question) {
      return Array.isArray(question.options) && question.options.length > 0;
    }

    function normalizeChoiceAnswer(value, question) {
      const source = String(Array.isArray(value) ? value.join(",") : value || "").toUpperCase();
      const optionLabels = new Set((question?.options || []).map((option) => option.label));
      let labels = source.match(/[A-Z]/g) || [];
      labels = labels.filter((label) => !optionLabels.size || optionLabels.has(label));
      if (!labels.length && question?.options?.length) {
        const normalizedSource = normalize(source);
        labels = question.options
          .filter((option) => normalizedSource && normalize(option.text) === normalizedSource)
          .map((option) => option.label);
      }
      return [...new Set(labels)].sort();
    }

    function normalizeCategory(value, fallback = "term") {
      const key = String(value || "").trim();
      return categoryAliases[key] || key || fallback;
    }

    function normalizeChapter(value, fallback = "未分章") {
      return String(value || "").trim() || fallback;
    }

    function normalizeQuestion(raw, index) {
      if (!raw || typeof raw !== "object") return null;
      const title = String(raw.title || raw.question || raw.name || "").trim();
      const answer = String(raw.answer || raw.reference || raw.solution || "").trim();
      if (!title || !answer) return null;
      const options = normalizeChoiceOptions(raw.options || raw.choices);
      const expectedChoiceCount = options.length ? normalizeChoiceAnswer(answer, { options }).length : 0;
      const inferredChoiceCategory = expectedChoiceCount > 1 || raw.multiple ? "multipleChoice" : "singleChoice";
      const rawCategory = normalizeCategory(raw.category || raw.type, options.length ? inferredChoiceCategory : "term");
      const category = rawCategory === "choice" && options.length ? inferredChoiceCategory : rawCategory;
      const isMultipleChoice = options.length && (expectedChoiceCount > 1 || Boolean(raw.multiple) || category === "multipleChoice");
      const chapter = normalizeChapter(raw.chapter || raw.section || raw.unit || raw.part);
      const keywords = Array.isArray(raw.keywords)
        ? raw.keywords.map((item) => String(item).trim()).filter(Boolean)
        : deriveKeywords(answer);
      return {
        id: String(raw.id || `${category}-${String(index + 1).padStart(2, "0")}`),
        chapter,
        category,
        title,
        prompt: String(raw.prompt || (options.length ? (isMultipleChoice ? "请选择所有正确答案。" : "请选择正确答案。") : "请作答。")),
        minRequired: Number.isFinite(Number(raw.minRequired)) ? Number(raw.minRequired) : undefined,
        keywords,
        options,
        multiple: options.length ? isMultipleChoice : Boolean(raw.multiple),
        answer
      };
    }

    function parseQuestionBankPayload(payload) {
      const sourceQuestions = Array.isArray(payload) ? payload : payload?.questions;
      if (!Array.isArray(sourceQuestions)) {
        throw new Error("题库 JSON 需要是数组，或包含 questions 数组。");
      }
      const parsed = sourceQuestions
        .map((item, index) => normalizeQuestion(item, index))
        .filter(Boolean);
      if (!parsed.length) {
        throw new Error("没有识别到有效题目。每题至少需要 title/question 和 answer。");
      }
      return parsed;
    }

    function titleFromQuestionBankPayload(payload, fallback = defaultBankTitle) {
      if (Array.isArray(payload)) return fallback;
      const title = String(payload?.title || payload?.bankTitle || payload?.name || fallback).trim();
      return title || fallback;
    }

    function createEmptyPracticeState(list = questions) {
      return {
        activeChapter: "all",
        activeCategory: "all",
        query: "",
        missedOnly: false,
        currentIndex: 0,
        expanded: false,
        order: list.map((item) => item.id),
        answers: {},
        results: {},
        visibleAnswers: {}
      };
    }

    function normalizeSavedPracticeState(saved, list = questions) {
      const base = createEmptyPracticeState(list);
      if (!saved || typeof saved !== "object") return base;
      return {
        ...base,
        answers: saved.answers || {},
        results: saved.results || {},
        visibleAnswers: saved.visibleAnswers || {},
        order: Array.isArray(saved.order) ? saved.order : base.order,
        currentIndex: Number.isInteger(saved.currentIndex) ? saved.currentIndex : 0,
        expanded: Boolean(saved.expanded),
        activeChapter: typeof saved.activeChapter === "string" ? saved.activeChapter : base.activeChapter,
        activeCategory: typeof saved.activeCategory === "string" ? saved.activeCategory : base.activeCategory
      };
    }

    function createBankId(title) {
      const slug = normalize(title).slice(0, 24) || "bank";
      return `bank-${Date.now().toString(36)}-${slug}`;
    }

    function createBankRecord(id, title, bankQuestions, practice = {}, meta = {}) {
      const parsedQuestions = parseQuestionBankPayload({ questions: bankQuestions });
      return {
        id,
        title: String(title || defaultBankTitle).trim() || defaultBankTitle,
        description: String(meta.description || "").trim(),
        source: normalizeBankSource(meta.source),
        questions: parsedQuestions,
        practice: normalizeSavedPracticeState(practice, parsedQuestions)
      };
    }

    function normalizeBankSource(source) {
      return bankSourceLabels[source] ? source : "local";
    }

    function readLegacyQuestionBank() {
      try {
        const raw = localStorage.getItem(questionBankStorageKey);
        if (!raw) return null;
        const payload = JSON.parse(raw);
        return {
          title: titleFromQuestionBankPayload(payload),
          questions: parseQuestionBankPayload(payload)
        };
      } catch {
        localStorage.removeItem(questionBankStorageKey);
        return null;
      }
    }

    function readLegacyPracticeState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey) || "{}");
      } catch {
        return {};
      }
    }

    function loadBankLibrary() {
      try {
        const raw = localStorage.getItem(bankLibraryStorageKey);
        if (raw) {
          const parsed = JSON.parse(raw);
          const banks = Array.isArray(parsed.banks)
            ? parsed.banks.map((bank) => createBankRecord(bank.id, bank.title, bank.questions, bank.practice, bank)).filter(Boolean)
            : [];
          return { version: 1, activeId: "", banks };
        }
      } catch {
        localStorage.removeItem(bankLibraryStorageKey);
      }

      const legacyBank = readLegacyQuestionBank();
      const legacyPractice = readLegacyPracticeState();
      const banks = legacyBank
        ? [createBankRecord(defaultBankId, legacyBank.title, legacyBank.questions, legacyPractice, { description: "从旧版本地题库迁移。", source: "local" })]
        : [];
      const library = { version: 1, activeId: "", banks };
      persistBankLibrary(library);
      return library;
    }

    function persistBankLibrary(library = bankLibrary) {
      localStorage.setItem(bankLibraryStorageKey, JSON.stringify({
        version: 1,
        activeId: "",
        banks: library.banks
      }));
    }

    function getActiveBank() {
      return bankLibrary.banks.find((bank) => bank.id === activeBankId) || null;
    }

    function capturePracticeState() {
      return {
        answers: state.answers,
        results: state.results,
        visibleAnswers: state.visibleAnswers,
        order: state.order,
        currentIndex: state.currentIndex,
        expanded: state.expanded,
        activeChapter: state.activeChapter,
        activeCategory: state.activeCategory
      };
    }

    function saveActiveBankPractice() {
      const bank = getActiveBank();
      if (!bank) return;
      bank.practice = normalizeSavedPracticeState(capturePracticeState(), questions);
      persistBankLibrary();
    }

    function applyPracticeState(saved) {
      const next = normalizeSavedPracticeState(saved, questions);
      state.answers = next.answers;
      state.results = next.results;
      state.visibleAnswers = next.visibleAnswers;
      state.order = next.order;
      state.currentIndex = next.currentIndex;
      state.expanded = next.expanded;
      state.activeChapter = next.activeChapter;
      state.activeCategory = next.activeCategory;
      state.missedOnly = false;
      state.query = "";
      els.search.value = "";
      document.querySelector("#focusMissed").textContent = "错题回看";
    }

    function refreshActiveBankFromLibrary() {
      activeBank = getActiveBank();
      if (!activeBank) {
        renderHome();
        return;
      }
      activeBankId = activeBank.id;
      bankTitle = activeBank.title;
      questions = activeBank.questions;
      currentView = "practice";
      document.querySelector("#bankPanel").dataset.mode = "practice";
      applyPracticeState(activeBank.practice);
      updateBankTitle();
      renderBankList();
      renderFilters();
      renderQuestions();
    }

    async function loadBuiltInBankCatalog() {
      const response = await fetch(builtInBankManifestUrl);
      if (!response.ok) throw new Error("题库目录加载失败");
      const manifest = await response.json();
      const entries = Array.isArray(manifest.banks) ? manifest.banks : [];
      const records = await Promise.all(entries.map(async (entry) => {
        const bankResponse = await fetch(`./banks/${entry.file}`);
        if (!bankResponse.ok) throw new Error(`题库加载失败：${entry.title || entry.file}`);
        const payload = await bankResponse.json();
        const id = payload.id || entry.id || createBankId(payload.title || entry.title);
        const existing = bankLibrary.banks.find((bank) => bank.id === id);
        return createBankRecord(
          id,
          payload.title || entry.title,
          payload.questions,
          existing?.practice || {},
          {
            description: payload.description || entry.description || "",
            source: "built-in"
          }
        );
      }));

      records.forEach((record) => {
        const existingIndex = bankLibrary.banks.findIndex((bank) => bank.id === record.id);
        if (existingIndex >= 0) {
          bankLibrary.banks[existingIndex] = record;
        } else {
          bankLibrary.banks.push(record);
        }
      });
      persistBankLibrary();
    }

    function bankCountsBySource() {
      return bankLibrary.banks.reduce((counts, bank) => {
        const source = normalizeBankSource(bank.source);
        counts[source] = (counts[source] || 0) + 1;
        return counts;
      }, {});
    }

    function renderBankSection(source, size = "compact") {
      const banks = bankLibrary.banks.filter((bank) => normalizeBankSource(bank.source) === source);
      if (!banks.length) {
        const emptyText = source === "built-in"
          ? "还没有内置题库。"
          : source === "shared"
            ? "还没有云端候选题库。静态网页不能直接同步到其他设备，需要加入内置题库后重新部署。"
            : "还没有本地题库。导入 JSON 后会出现在这里。";
        return `<div class="bank-section" data-bank-source="${source}"><p class="bank-section-title">${bankSourceLabels[source]}</p><div class="empty">${emptyText}</div></div>`;
      }
      return `
        <div class="bank-section" data-bank-source="${source}">
          <p class="bank-section-title">${bankSourceLabels[source]}</p>
          <div class="bank-section-grid">
            ${banks.map((bank) => (
              `<button class="bank-card ${size === "large" ? "large" : ""} ${bank.id === activeBankId ? "active" : ""}" type="button" data-bank-start="${escapeHtml(bank.id)}">
                <span class="bank-card-source">${bankSourceLabels[normalizeBankSource(bank.source)]}</span>
                <strong>${escapeHtml(bank.title)}</strong>
                <span>${bank.questions.length} 题</span>
                ${bank.description ? `<span>${escapeHtml(bank.description)}</span>` : ""}
              </button>`
            )).join("")}
          </div>
        </div>
      `;
    }

    function renderBankCards(size = "compact", source = activeBankSourceFilter) {
      if (!bankLibrary.banks.length) {
        return `<div class="empty">还没有可用题库。你可以导入 JSON 题库。</div>`;
      }
      if (size === "large") {
        return ["built-in", "local", "shared"].map((item) => renderBankSection(item, size)).join("");
      }
      return renderBankSection(source, size);
    }

    function renderBankSourceTabs() {
      const tabs = document.querySelectorAll("[data-bank-source-filter]");
      const counts = bankCountsBySource();
      tabs.forEach((tab) => {
        const source = tab.dataset.bankSourceFilter;
        tab.classList.toggle("active", source === activeBankSourceFilter);
        tab.textContent = `${bankSourceLabels[source].replace("题库", "")} ${counts[source] || 0}`;
      });
    }

    function renderBankList() {
      els.bankList.innerHTML = renderBankCards();
      renderBankSourceTabs();
      const homeBankGrid = document.querySelector("#homeBankGrid");
      if (homeBankGrid) {
        homeBankGrid.innerHTML = renderBankCards("large");
      }
    }

    function renderHome() {
      currentView = "home";
      activeBankId = "";
      activeBank = null;
      bankTitle = "";
      questions = [];
      document.querySelector("#bankPanel").dataset.mode = "home";
      document.title = "自测题库中心";
      els.pageTitle.textContent = "自测题库中心";
      els.practiceTools.hidden = true;
      els.practiceActions.forEach((item) => item.hidden = true);
      els.list.innerHTML = `
        <article class="question-card home-panel" id="homePanel">
          <h2>选择一个题库开始</h2>
          <p>题库按内置、本地、云端候选分区显示。首页先看清来源，再进入练习。</p>
          <p>导入题库会先保存在当前浏览器；要让其他设备看到，需要把题库加入内置题库并重新部署。</p>
          <div class="home-bank-grid" id="homeBankGrid"></div>
        </article>
      `;
      renderBankList();
      renderSummary();
    }

    function addQuestionBank(nextQuestions, nextTitle = bankTitle, meta = {}) {
      saveActiveBankPractice();
      const newBank = createBankRecord(createBankId(nextTitle), nextTitle, nextQuestions, {}, meta);
      bankLibrary.banks.push(newBank);
      activeBankSourceFilter = normalizeBankSource(newBank.source);
      activeBankId = newBank.id;
      persistBankLibrary();
      refreshActiveBankFromLibrary();
      return newBank;
    }

    function switchQuestionBank(nextBankId) {
      if (!nextBankId || nextBankId === activeBankId) return;
      saveActiveBankPractice();
      if (!bankLibrary.banks.some((bank) => bank.id === nextBankId)) return;
      activeBankId = nextBankId;
      persistBankLibrary();
      refreshActiveBankFromLibrary();
    }

    function updateBankTitle() {
      els.pageTitle.textContent = bankTitle;
      document.title = `${bankTitle}闭卷自测`;
      els.practiceTools.hidden = false;
      els.practiceActions.forEach((item) => item.hidden = false);
    }

    function resetPracticeState() {
      state.answers = {};
      state.results = {};
      state.visibleAnswers = {};
      state.missedOnly = false;
      state.activeCategory = "all";
      state.currentIndex = 0;
      state.expanded = false;
      state.order = questions.map((item) => item.id);
      state.query = "";
      els.search.value = "";
      document.querySelector("#focusMissed").textContent = "错题回看";
      saveState();
    }

    function buildQuestionBankExport() {
      return {
        version: 1,
        title: bankTitle,
        schema: {
          required: ["title", "answer"],
          optional: ["id", "chapter", "category", "prompt", "keywords", "minRequired", "options", "multiple"]
        },
        chapters: chapterOptions().filter((item) => item !== "all"),
        categories: categoryOptions().filter((item) => item !== "all"),
        questions: questions.map((question) => ({
          ...question,
          category: getQuestionType(question)
        }))
      };
    }

    function downloadText(filename, text) {
      const blob = new Blob([text], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function normalize(text) {
      return String(text || "")
        .toUpperCase()
        .replace(/[，。、“”‘’：；（）【】《》]/g, "")
        .replace(/[,\."':;()[\]{}<>]/g, "")
        .replace(/\s+/g, "")
        .replace(/×/g, "*")
        .replace(/＋/g, "+")
        .replace(/－/g, "-")
        .replace(/＞/g, ">")
        .replace(/＜/g, "<");
    }

    function normalizeReadable(text) {
      return String(text || "")
        .toUpperCase()
        .replace(/×/g, "*")
        .replace(/＋/g, "+")
        .replace(/－/g, "-")
        .replace(/＞/g, ">")
        .replace(/＜/g, "<")
        .replace(/\s+/g, " ")
        .trim();
    }

    function phraseVariants(phrase) {
      const normalized = normalize(phrase);
      const variants = new Set([phrase, normalized]);
      aliasGroups.forEach((group) => {
        const normalizedGroup = group.map((item) => normalize(item));
        if (normalizedGroup.includes(normalized)) {
          group.forEach((item) => variants.add(item));
        }
      });
      return [...variants].map((item) => normalize(item)).filter(Boolean);
    }

    function containsPhrase(answer, phrase) {
      const source = normalize(answer);
      return phraseVariants(phrase).some((variant) => source.includes(variant));
    }

    function keywordHit(answer, keyword) {
      const source = normalize(answer);
      const target = normalize(keyword);
      if (!target) return false;
      if (containsPhrase(answer, keyword)) return true;
      if (target.includes("NPV>0")) return source.includes("NPV") && source.includes(">0");
      if (target.includes("NPV<0")) return source.includes("NPV") && source.includes("<0");
      if (target === "1+R/M") return source.includes("1+R/M") || source.includes("(1+R/M)");
      return false;
    }

    function charBigrams(text) {
      const value = normalize(text);
      if (value.length <= 1) return value ? [value] : [];
      const grams = [];
      for (let index = 0; index < value.length - 1; index += 1) {
        grams.push(value.slice(index, index + 2));
      }
      return grams;
    }

    function diceSimilarity(left, right) {
      const a = charBigrams(left);
      const b = charBigrams(right);
      if (!a.length || !b.length) return 0;
      const counts = new Map();
      a.forEach((gram) => counts.set(gram, (counts.get(gram) || 0) + 1));
      let overlap = 0;
      b.forEach((gram) => {
        const count = counts.get(gram) || 0;
        if (count > 0) {
          overlap += 1;
          counts.set(gram, count - 1);
        }
      });
      return (2 * overlap) / (a.length + b.length);
    }

    function lcsRatio(left, right) {
      const a = normalize(left);
      const b = normalize(right);
      if (!a || !b) return 0;
      const previous = new Array(b.length + 1).fill(0);
      const current = new Array(b.length + 1).fill(0);
      for (let i = 1; i <= a.length; i += 1) {
        for (let j = 1; j <= b.length; j += 1) {
          current[j] = a[i - 1] === b[j - 1]
            ? previous[j - 1] + 1
            : Math.max(previous[j], current[j - 1]);
        }
        for (let j = 0; j <= b.length; j += 1) previous[j] = current[j];
      }
      return previous[b.length] / Math.max(a.length, b.length);
    }

    function answerUnits(question) {
      return question.answer
        .split(/\n|；|;|。|\.|（\d+）|\(\d+\)|\d+[.、]/)
        .map((item) => item.replace(/^(答案|判断|特征|策略|优点|缺点|泰罗|法约尔)[:：]/, "").trim())
        .filter((item) => normalize(item).length >= 2);
    }

    function unitScore(answer, unit) {
      const direct = containsPhrase(answer, unit) ? 1 : 0;
      const dice = diceSimilarity(answer, unit);
      const lcs = lcsRatio(answer, unit);
      const unitPieces = unit
        .split(/、|，|,|和|与|及|或|以|为|是|有利于/)
        .map((item) => item.trim())
        .filter((item) => normalize(item).length >= 2);
      const pieceHits = unitPieces.length
        ? unitPieces.filter((piece) => containsPhrase(answer, piece) || diceSimilarity(answer, piece) >= .62).length / unitPieces.length
        : 0;
      return Math.max(direct, dice * .72 + lcs * .28, pieceHits * .88);
    }

    function evaluateUnits(question, answer) {
      const units = answerUnits(question);
      const unitResults = units.map((unit) => {
        const score = unitScore(answer, unit);
        return {
          unit,
          score,
          hit: score >= .56
        };
      });
      const coverage = unitResults.length
        ? unitResults.reduce((sum, item) => sum + Math.min(item.score, 1), 0) / unitResults.length
        : 0;
      return { units: unitResults, coverage };
    }

    function evaluateStructure(question, answer) {
      const expectedCount = question.minRequired || (question.prompt.match(/\d+/)?.[0] ? Number(question.prompt.match(/\d+/)[0]) : 0);
      const answerText = String(answer || "");
      const numbered = (answerText.match(/（\d+）|\(\d+\)|\d+[.、]/g) || []).length;
      const separators = answerText.split(/\n|；|;|。/).filter((item) => normalize(item).length >= 2).length;
      const itemCount = Math.max(numbered, separators);
      if (!expectedCount) {
        const hasLabel = /特征|策略|优点|缺点|泰罗|法约尔|基础|特征|主体|形式/.test(answerText);
        return { score: hasLabel ? 1 : .82, expectedCount: 0, itemCount, message: hasLabel ? "结构标注清楚" : "结构尚可" };
      }
      const score = Math.min(1, itemCount / expectedCount);
      return { score, expectedCount, itemCount, message: `写出 ${itemCount}/${expectedCount} 条` };
    }

    function evaluateFormula(question, answer) {
      if (question.category !== "formula") return { score: 1, notes: [] };
      const source = normalize(answer);
      const required = question.keywords.map((item) => normalize(item));
      const hits = required.filter((item) => {
        if (item === "NPV>0") return source.includes("NPV") && source.includes(">0");
        if (item === "NPV<0") return source.includes("NPV") && source.includes("<0");
        if (item === "1+R/M") return source.includes("1+R/M") || source.includes("(1+R/M)");
        return source.includes(item);
      });
      const hasPower = /\^-?T|\(-T\)|\^M/.test(source) || source.includes("-T") || source.includes("^M");
      const score = Math.min(1, (hits.length / required.length) * .82 + (hasPower ? .18 : 0));
      return { score, notes: hits };
    }

    function evaluateChoiceQuestion(question) {
      const selected = normalizeChoiceAnswer(state.answers[question.id], question);
      const expected = normalizeChoiceAnswer(question.answer, question);
      const optionText = new Map(question.options.map((option) => [option.label, option.text]));
      const correct = expected.length > 0 && selected.length === expected.length && selected.every((label) => expected.includes(label));
      const hits = question.options.map((option) => ({
        keyword: `${option.label}. ${option.text}`,
        hit: expected.includes(option.label) === selected.includes(option.label)
      }));
      return {
        hitCount: correct ? expected.length : 0,
        required: expected.length || 1,
        denominator: expected.length || 1,
        ratio: correct ? 1 : 0,
        mastered: correct,
        almost: false,
        hits,
        metrics: {
          keywordCoverage: correct ? 1 : 0,
          unitCoverage: correct ? 1 : 0,
          similarity: correct ? 1 : 0,
          structure: 1,
          formula: 1,
          lengthRatio: selected.length ? 1 : 0
        },
        units: [],
        structure: { score: 1, expectedCount: expected.length, itemCount: selected.length, message: "选择题" },
        choice: {
          selected,
          expected,
          selectedText: selected.map((label) => `${label}. ${optionText.get(label) || ""}`.trim()),
          expectedText: expected.map((label) => `${label}. ${optionText.get(label) || ""}`.trim())
        }
      };
    }

    function exactAnswerMatch(question, answer) {
      return normalize(answer) && normalize(answer) === normalize(question.answer);
    }

    function evaluateQuestion(question) {
      if (isChoiceQuestion(question)) return evaluateChoiceQuestion(question);
      const answer = state.answers[question.id] || "";
      const trimmedAnswer = answer.trim();
      if (exactAnswerMatch(question, trimmedAnswer)) {
        const hits = question.keywords.map((keyword) => ({ keyword, hit: true }));
        const units = answerUnits(question).map((unit) => ({ unit, score: 1, hit: true }));
        return {
          hitCount: hits.length,
          required: question.minRequired || question.keywords.length,
          denominator: question.keywords.length,
          ratio: 1,
          mastered: true,
          almost: false,
          hits,
          metrics: {
            keywordCoverage: 1,
            unitCoverage: 1,
            similarity: 1,
            structure: 1,
            formula: 1,
            lengthRatio: 1
          },
          units,
          structure: { score: 1, expectedCount: question.minRequired || 0, itemCount: question.minRequired || units.length, message: "答案完全一致" }
        };
      }
      const hits = question.keywords.map((keyword) => ({
        keyword,
        hit: keywordHit(answer, keyword)
      }));
      const hitCount = hits.filter((item) => item.hit).length;
      const required = question.minRequired || question.keywords.length;
      const denominator = question.minRequired ? question.keywords.length : required;
      const keywordCoverage = required === 0 ? 0 : Math.min(1, hitCount / required);
      const unitEvaluation = evaluateUnits(question, answer);
      const answerSimilarity = Math.max(diceSimilarity(answer, question.answer), lcsRatio(answer, question.answer));
      const structure = evaluateStructure(question, answer);
      const formula = evaluateFormula(question, answer);
      const lengthRatio = Math.min(1, normalize(trimmedAnswer).length / Math.max(1, normalize(question.answer).length * .55));
      const emptyPenalty = trimmedAnswer ? 1 : 0;
      const categoryWeights = question.category === "formula"
        ? { keyword: .22, unit: .18, similarity: .12, structure: .08, formula: .60 }
        : question.category === "short" || question.category === "case"
          ? { keyword: .26, unit: .34, similarity: .16, structure: .24, formula: 0 }
          : { keyword: .30, unit: .34, similarity: .26, structure: .10, formula: 0 };
      const weightedScore = (
        keywordCoverage * categoryWeights.keyword +
        unitEvaluation.coverage * categoryWeights.unit +
        answerSimilarity * categoryWeights.similarity +
        structure.score * categoryWeights.structure +
        formula.score * categoryWeights.formula
      ) * lengthRatio * emptyPenalty;
      const ratio = Math.max(0, Math.min(1, weightedScore));
      const mastered = ratio >= .82 && keywordCoverage >= (question.minRequired ? .62 : .66) && unitEvaluation.coverage >= .58;
      const almost = !mastered && ratio >= .60;
      return {
        hitCount,
        required,
        denominator,
        ratio,
        mastered,
        almost,
        hits,
        metrics: {
          keywordCoverage,
          unitCoverage: unitEvaluation.coverage,
          similarity: answerSimilarity,
          structure: structure.score,
          formula: formula.score,
          lengthRatio
        },
        units: unitEvaluation.units,
        structure
      };
    }

    function getOrderedQuestions() {
      const byId = new Map(questions.map((item) => [item.id, item]));
      return state.order
        .map((id) => byId.get(id))
        .filter(Boolean)
        .concat(questions.filter((item) => !state.order.includes(item.id)));
    }

    function getFilteredQuestions() {
      return getOrderedQuestions().filter((question) => {
        const chapterMatch = state.activeChapter === "all" || getQuestionChapter(question) === state.activeChapter;
        const categoryMatch = state.activeCategory === "all" || getQuestionType(question) === state.activeCategory || question.category === state.activeCategory;
        const result = state.results[question.id];
        const missedMatch = !state.missedOnly || (result && !result.mastered);
        const haystack = normalize(`${question.title}${question.prompt}${question.answer}${question.keywords.join("")}${getQuestionChapter(question)}${getCategoryLabel(getQuestionType(question))}`);
        const queryMatch = !state.query || haystack.includes(normalize(state.query));
        return chapterMatch && categoryMatch && missedMatch && queryMatch;
      });
    }

    function getQuestionChapter(question) {
      return normalizeChapter(question.chapter);
    }

    function getQuestionType(question) {
      if (isChoiceQuestion(question)) {
        const expected = normalizeChoiceAnswer(question.answer, question);
        return expected.length > 1 || question.multiple ? "multipleChoice" : "singleChoice";
      }
      return question.category || "term";
    }

    function getCategoryLabel(category) {
      return categoryLabels[category] || category || "未分类";
    }

    function categoryOptions() {
      return ["all", ...new Set(questions.map((item) => getQuestionType(item)))];
    }

    function chapterOptions() {
      return ["all", ...new Set(questions.map((item) => getQuestionChapter(item)))];
    }

    function clampCurrentIndex(list = getFilteredQuestions()) {
      if (!list.length) {
        state.currentIndex = 0;
        return;
      }
      if (state.currentIndex < 0) state.currentIndex = 0;
      if (state.currentIndex >= list.length) state.currentIndex = list.length - 1;
    }

    function setCurrentById(id) {
      const visible = getFilteredQuestions();
      const index = visible.findIndex((item) => item.id === id);
      state.currentIndex = index >= 0 ? index : 0;
      saveState();
    }

    function moveQuestion(step) {
      const visible = getFilteredQuestions();
      clampCurrentIndex(visible);
      state.currentIndex = Math.min(Math.max(state.currentIndex + step, 0), Math.max(visible.length - 1, 0));
      saveState();
      preserveScroll(renderQuestions);
    }

    function renderFilters() {
      const chapters = chapterOptions();
      els.chapterFilterRow.innerHTML = chapters.map((chapter) => (
        `<button class="ghost-btn ${state.activeChapter === chapter ? "active" : ""}" type="button" data-chapter="${escapeHtml(chapter)}">${chapter === "all" ? "全部" : escapeHtml(chapter)}</button>`
      )).join("");
      const categories = categoryOptions();
      els.filterRow.innerHTML = categories.map((category) => (
        `<button class="ghost-btn ${state.activeCategory === category ? "active" : ""}" type="button" data-category="${category}">${getCategoryLabel(category)}</button>`
      )).join("");
    }

    function statusText(result) {
      if (!result) return ["未判", ""];
      if (result.mastered) return ["掌握", "good"];
      if (result.almost) return ["待补", "almost"];
      return ["重背", "bad"];
    }

    function choiceAnswerText(question) {
      const expected = normalizeChoiceAnswer(question.answer, question);
      const optionText = new Map((question.options || []).map((option) => [option.label, option.text]));
      const answer = expected.map((label) => `${label}. ${optionText.get(label) || ""}`.trim()).join("\n");
      return answer ? `正确答案：\n${answer}` : `正确答案：${question.answer}`;

    function renderQuestionCard(question, options = {}) {
      const answer = state.answers[question.id] || "";
      const result = state.results[question.id];
      const [label, tone] = statusText(result);
      const resultHtml = result ? renderFeedback(question, result) : renderUnscoredAnswer(question);
      const answerInput = isChoiceQuestion(question)

      const showNext = options.showNext !== false;
      const nextDisabled = options.isLast ? "disabled" : "";
      const nextButton = showNext
        ? `<button class="primary-btn" type="button" data-check-next="${question.id}" ${nextDisabled}>判分并下一题</button>`
        : "";
      return `
        <article class="question-card" id="${question.id}">
          <div class="question-head">

            <button class="icon-btn" type="button" data-clear="${question.id}" title="清空本题">×</button>
          </div>

    function renderQuestions() {
      if (currentView === "home" || !activeBank) {
        renderHome();
        return;
      }
      const visible = getFilteredQuestions();
      if (!visible.length) {
        els.list.innerHTML = `<div class="question-card empty">当前筛选下没有题目。换个分类、清空搜索，或者先交卷生成错题。</div>`;
        renderSummary();
        return;
      }

      if (state.expanded) {
        els.list.innerHTML = `
          <div class="mode-banner">
            <span><strong>整体展开</strong>：当前显示 ${visible.length} 道题，可以连续填写、逐题判分，也可以交卷统一判。</span>
            <button class="secondary-btn" type="button" data-collapse>回到单题</button>
          </div>
          ${visible.map((question) => renderQuestionCard(question, { showNext: false })).join("")}
        `;
        renderSummary();
        return;
      }

      clampCurrentIndex(visible);
      const question = visible[state.currentIndex];
      const isFirst = state.currentIndex === 0;
      const isLast = state.currentIndex === visible.length - 1;
      const chapterLabel = state.activeChapter === "all" ? "全部章节" : state.activeChapter;
      const typeLabel = getCategoryLabel(state.activeCategory);

      els.list.innerHTML = `
        <div class="question-pager">
          <div class="pager-top">
            <span class="pager-count">第 ${state.currentIndex + 1} / ${visible.length} 题</span>

          </div>
          <div class="pager-controls">
            <button class="secondary-btn" type="button" data-prev ${isFirst ? "disabled" : ""}>上一题</button>
            <button class="secondary-btn" type="button" data-next ${isLast ? "disabled" : ""}>下一题</button>
          </div>
        </div>
        ${renderQuestionCard(question, { isLast })}
      `;
      renderSummary();
    }

    function renderUnscoredAnswer(question) {
      const standardAnswer = isChoiceQuestion(question) ? choiceAnswerText(question) : question.answer;
      return `
        <div class="score-line">
          <span><strong>未判分</strong> · 先自己默写，必要时再看答案。</span>
          <span>标准答案</span>
        </div>
        <div class="answer-box ${state.visibleAnswers[question.id] ? "visible" : ""}">${escapeHtml(standardAnswer)}</div>
      `;
    }

    function renderFeedback(question, result) {
      if (isChoiceQuestion(question)) return renderChoiceFeedback(question, result);
      const answerOpen = state.visibleAnswers[question.id];
      const missed = result.hits.filter((item) => !item.hit).length;
      const goodPoints = result.hits.filter((item) => item.hit).map((item) => item.keyword);
      const problemPoints = result.hits.filter((item) => !item.hit).map((item) => item.keyword);
      const score = Math.round(result.ratio * 100);
      const metrics = result.metrics || {};
      const unitMisses = (result.units || [])
        .filter((item) => !item.hit)
        .map((item) => item.unit)
        .slice(0, 4);
      const keywordHtml = result.hits.map((item) => (
        `<span class="keyword ${item.hit ? "hit" : "miss"}">${item.hit ? "已命中" : "待补"}：${escapeHtml(item.keyword)}</span>`
      )).join("");
      const keywordSummary = `关键概念：已命中 ${goodPoints.length} 个，待补 ${problemPoints.length} 个`;
      const keywordDetails = result.hits.length
        ? `<details class="keyword-details"><summary>${keywordSummary}</summary><div class="keyword-grid">${keywordHtml}</div></details>`
        : "";
      const goodList = goodPoints.length
        ? [
            ...goodPoints.slice(0, 8).map((item) => `<li>要点表达有效：${escapeHtml(item)}</li>`),
            `<li>答案相似度约 ${Math.round((metrics.similarity || 0) * 100)}%，结构完整度约 ${Math.round((metrics.structure || 0) * 100)}%。</li>`
          ].join("")
        : "<li>暂时没有明显命中的标准要点，建议先对照答案补框架。</li>";
      const missedConcepts = problemPoints.length
        ? `关键概念待补：${problemPoints.slice(0, 6).join("、")}${problemPoints.length > 6 ? `等 ${problemPoints.length} 个` : ""}。`
        : "";
      const problems = [
        ...unitMisses.map((item) => `标准答案中的这一层意思还不够完整：${item}`),
        missedConcepts
      ].filter(Boolean);
      if ((metrics.lengthRatio || 0) < .72) problems.unshift("答案篇幅偏短，可能只是写了零散词语，没有形成完整解释。");
      if ((metrics.unitCoverage || 0) < .58) problems.unshift("标准答案的核心语义覆盖不足，需要补完整句或完整条目。");
      const problemList = problems.length
        ? [...new Set(problems)].map((item) => `<li>${escapeHtml(item)}</li>`).join("")
        : "<li>标准要点基本齐全，下一轮注意语言更完整、条理更清楚。</li>";
      const summary = result.mastered
        ? "要点齐了，可以进入下一题。"
        : result.almost
          ? `整体接近，但还有 ${missed} 个关键概念或若干语义层次需要补。`
          : `答案与标准答案差距较大，建议先看标准答案再默一遍。`;
      return `
        <div class="score-line">
          <span><strong>${score}%</strong> · ${summary}</span>
          <span>要点 ${result.hitCount}/${result.required} · 语义 ${Math.round((metrics.unitCoverage || 0) * 100)}%</span>
        </div>
        <div class="answer-box ${answerOpen ? "visible" : ""}">${escapeHtml(question.answer)}</div>
        <div class="feedback-panels">
          <div class="feedback-panel">
            <p class="feedback-title good">写得好的点</p>
            <ul class="feedback-list">${goodList}</ul>
          </div>
          <div class="feedback-panel">
            <p class="feedback-title bad">主要问题</p>
            <ul class="feedback-list">${problemList}</ul>
          </div>
        </div>
        ${keywordDetails}
      `;
    }

    function renderChoiceFeedback(question, result) {
      const answerOpen = state.visibleAnswers[question.id];
      const selected = result.choice?.selected || [];
      const expected = result.choice?.expected || [];
      const selectedText = result.choice?.selectedText?.join("；") || "未选择";
      const expectedText = result.choice?.expectedText?.join("；") || question.answer;
      const summary = result.mastered ? "选择正确，可以进入下一题。" : "选择不正确，先对照正确答案再做一遍。";
      const goodList = result.mastered
        ? `<li>你的选择 ${escapeHtml(selected.join("、"))} 与标准答案一致。</li>`
        : `<li>已完成选择，建议重点对照选项差异。</li>`;
      const problemList = result.mastered
        ? `<li>没有明显问题。</li>`
        : `<li>你的选择：${escapeHtml(selectedText)}。</li><li>正确答案：${escapeHtml(expectedText)}。</li>`;
      return `
        <div class="score-line">
          <span><strong>${Math.round(result.ratio * 100)}%</strong> · ${summary}</span>
          <span>答案 ${escapeHtml(expected.join("、") || question.answer)}</span>
        </div>
        <div class="answer-box ${answerOpen ? "visible" : ""}">${escapeHtml(choiceAnswerText(question))}</div>
        <div class="feedback-panels">
          <div class="feedback-panel">
            <p class="feedback-title good">写得好的点</p>
            <ul class="feedback-list">${goodList}</ul>
          </div>
          <div class="feedback-panel">
            <p class="feedback-title bad">主要问题</p>
            <ul class="feedback-list">${problemList}</ul>
          </div>
        </div>
      `;
    }

    function renderSummary() {
      if (!questions.length) {
        els.heroTotal.textContent = 0;
        els.heroDone.textContent = 0;
        els.heroScore.textContent = "0%";
        els.filledCount.textContent = "0/0";
        els.checkedCount.textContent = "0/0";
        els.totalScore.textContent = "0%";
        els.goodCount.textContent = 0;
        els.weakCount.textContent = 0;
        els.progress.style.width = "0%";
        els.questionMiniList.innerHTML = `<div class="empty">选择题库后，这里会显示当前章节题目。</div>`;
        els.reviewList.innerHTML = `<div class="empty">选择题库后，这里会显示本次练习概览。</div>`;
        return;
      }
      const filled = questions.filter((item) => (state.answers[item.id] || "").trim()).length;
      const checked = Object.keys(state.results).length;
      const good = questions.filter((item) => state.results[item.id]?.mastered).length;
      const weak = questions.filter((item) => state.results[item.id] && !state.results[item.id].mastered).length;
      const score = checked ? Math.round(questions.reduce((sum, item) => sum + (state.results[item.id]?.ratio || 0), 0) / checked * 100) : 0;
      const expandToggle = document.querySelector("#expandToggle");

      els.heroTotal.textContent = questions.length;
      els.heroDone.textContent = checked;
      els.heroScore.textContent = `${score}%`;
      els.filledCount.textContent = `${filled}/${questions.length}`;
      els.checkedCount.textContent = `${checked}/${questions.length}`;
      els.totalScore.textContent = `${score}%`;
      els.goodCount.textContent = good;
      els.weakCount.textContent = weak;
      els.progress.style.width = `${Math.round(checked / questions.length * 100)}%`;
      if (expandToggle) {
        expandToggle.textContent = state.expanded ? "单题作答" : "整体展开";
      }

      const visible = getFilteredQuestions();
      const miniItems = visible.map((item, index) => {
        const result = state.results[item.id];
        const status = result
          ? result.mastered
            ? ["对", "good"]
            : result.almost
              ? ["错", "almost"]
              : ["错", "bad"]
          : ["未做", ""];
        const active = !state.expanded && visible[state.currentIndex]?.id === item.id;
        return `
          <button class="question-mini-item ${active ? "active" : ""} ${status[1]}" type="button" data-jump="${escapeHtml(item.id)}" title="${index + 1}. ${escapeHtml(status[0])} - ${escapeHtml(item.title)}" aria-label="第 ${index + 1} 题，${escapeHtml(status[0])}">${index + 1}</button>
        `;
      });
      els.questionMiniList.innerHTML = miniItems.length ? miniItems.join("") : `<div class="empty">当前筛选下没有题目。</div>`;

      const reviewItems = questions
        .filter((item) => state.results[item.id] && !state.results[item.id].mastered)
        .map((item) => {
          const result = state.results[item.id];
          const missed = result.hits.filter((hit) => !hit.hit).map((hit) => hit.keyword).slice(0, 3).join("、");
          return `<button class="review-item" type="button" data-jump="${item.id}"><strong>${escapeHtml(item.title)}</strong><span>待补：${escapeHtml(missed || "继续完善")}</span></button>`;
        });
      els.reviewList.innerHTML = reviewItems.length ? reviewItems.join("") : `<div class="empty">还没有错题。先判几题，薄弱点会出现在这里。</div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function preserveScroll(action) {
      const left = window.scrollX;
      const top = window.scrollY;
      action();
      window.requestAnimationFrame(() => window.scrollTo(left, top));
    }

    function checkOne(id) {
      checkOneAndNext(id, { advance: false });
    }

    function checkOneAndNext(id, options = {}) {
      const question = questions.find((item) => item.id === id);
      if (!question) return;
      const advance = options.advance !== false;
      const previousIndex = state.currentIndex;
      state.results[id] = evaluateQuestion(question);
      if (advance) {
        const visible = getFilteredQuestions();
        if (visible.length) {
          const stillVisibleIndex = visible.findIndex((item) => item.id === id);
          state.currentIndex = stillVisibleIndex >= 0
            ? Math.min(stillVisibleIndex + 1, visible.length - 1)
            : Math.min(previousIndex, visible.length - 1);
        } else {
          state.currentIndex = 0;
        }
      }
      saveState();
      preserveScroll(renderQuestions);
    }

    function submitAll() {
      questions.forEach((question) => {
        state.results[question.id] = evaluateQuestion(question);
      });
      saveState();
      preserveScroll(renderQuestions);
    }

    function shuffleQuestions() {
      const shuffled = [...state.order];
      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
      }
      state.order = shuffled;
      state.currentIndex = 0;
      saveState();
      renderQuestions();
    }

    function resetAll() {
      const confirmed = window.confirm("确定清空本次填写、判分和答案展开记录吗？");
      if (!confirmed) return;
      state.answers = {};
      state.results = {};
      state.visibleAnswers = {};
      state.missedOnly = false;
      state.activeChapter = "all";
      state.activeCategory = "all";
      state.currentIndex = 0;
      state.expanded = false;
      state.query = "";
      els.search.value = "";
      saveState();
      renderFilters();
      renderQuestions();
    }

    document.addEventListener("input", (event) => {
      const target = event.target;
      if (target.matches("[data-answer]")) {
        state.answers[target.dataset.answer] = target.value;
        saveState();
        renderSummary();
      }
      if (target === els.search) {
        state.query = target.value;
        state.currentIndex = 0;
        saveState();
        renderQuestions();
      }
    });

    document.addEventListener("keydown", (event) => {
      const choiceTarget = event.target.closest("[data-choice-question]");
      if (choiceTarget && event.key === "Enter" && !event.shiftKey && !event.isComposing) {
        event.preventDefault();
        checkOneAndNext(choiceTarget.dataset.choiceQuestion);
        return;
      }

      const answerTarget = event.target.closest("[data-answer]");
      if (answerTarget && event.key === "Enter" && !event.shiftKey && !event.isComposing) {
        event.preventDefault();
        state.answers[answerTarget.dataset.answer] = answerTarget.value;
        checkOneAndNext(answerTarget.dataset.answer);
        return;
      }

      const activeQuestion = getFilteredQuestions()[state.currentIndex];
      if (
        activeQuestion &&
        isChoiceQuestion(activeQuestion) &&
        event.key === "Enter" &&
        !event.shiftKey &&
        !event.isComposing &&
        !event.target.closest("input, textarea, select, button, a")
      ) {
        event.preventDefault();
        checkOneAndNext(activeQuestion.id);
      }
    });

    document.addEventListener("click", (event) => {
      const checkId = event.target.dataset.check;
      const checkNextId = event.target.dataset.checkNext;
      const toggleId = event.target.dataset.answerToggle;
      const clearId = event.target.dataset.clear;
      const chapter = event.target.dataset.chapter;
      const category = event.target.dataset.category;
      const jumpId = event.target.dataset.jump;
      const bankSourceFilter = event.target.dataset.bankSourceFilter;
      const bankStartId = event.target.closest("[data-bank-start]")?.dataset.bankStart;
      const choiceButton = event.target.closest("[data-choice-question]");

      if (bankSourceFilter) {
        activeBankSourceFilter = normalizeBankSource(bankSourceFilter);
        renderBankList();
        return;
      }

      if (bankStartId) {
        switchQuestionBank(bankStartId);
        return;
      }

      if (checkId) checkOne(checkId);
      if (checkNextId) checkOneAndNext(checkNextId);
      if (choiceButton) {
        const question = questions.find((item) => item.id === choiceButton.dataset.choiceQuestion);
        if (question) {
          const selected = normalizeChoiceAnswer(state.answers[question.id], question);
          const choice = choiceButton.dataset.choice;
          const expected = normalizeChoiceAnswer(question.answer, question);
          const isMultiple = expected.length > 1 || question.multiple;
          const nextSelected = isMultiple
            ? selected.includes(choice)
              ? selected.filter((item) => item !== choice)
              : [...selected, choice].sort()
            : [choice];
          state.answers[question.id] = nextSelected.join(",");
          delete state.results[question.id];
          saveState();
          preserveScroll(renderQuestions);
        }
      }
      if (event.target.dataset.prev !== undefined) moveQuestion(-1);
      if (event.target.dataset.next !== undefined) moveQuestion(1);
      if (event.target.dataset.collapse !== undefined) {
        state.expanded = false;
        saveState();
        renderQuestions();
      }
      if (toggleId) {
        state.visibleAnswers[toggleId] = !state.visibleAnswers[toggleId];
        saveState();
        preserveScroll(renderQuestions);
      }
      if (clearId) {
        delete state.answers[clearId];
        delete state.results[clearId];
        delete state.visibleAnswers[clearId];
        saveState();
        preserveScroll(renderQuestions);
      }
      if (chapter) {
        state.activeChapter = chapter;
        state.currentIndex = 0;
        saveState();
        renderFilters();
        renderQuestions();
      }
      if (category) {
        state.activeCategory = category;
        state.currentIndex = 0;
        saveState();
        renderFilters();
        renderQuestions();
      }
      if (jumpId) {
        state.missedOnly = false;
        document.querySelector("#focusMissed").textContent = "错题回看";
        setCurrentById(jumpId);
        renderQuestions();
      }
    });

    document.querySelector("#submitAll").addEventListener("click", submitAll);
    document.querySelector("#shuffleBtn").addEventListener("click", shuffleQuestions);
    document.querySelector("#resetAll").addEventListener("click", resetAll);
    document.querySelector("#backHome").addEventListener("click", () => {
      saveActiveBankPractice();
      renderHome();
    });
    document.querySelector("#exportBank").addEventListener("click", () => {
      downloadText(`${safeDownloadName(bankTitle)}.json`, JSON.stringify(buildQuestionBankExport(), null, 2));
    });
    document.querySelector("#importBank").addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const payload = JSON.parse(text);
        const importedQuestions = parseQuestionBankPayload(payload);
        const importedTitle = titleFromQuestionBankPayload(payload, "自定义自测题库");
        const source = document.querySelector("#importBankMode")?.value || "local";
        addQuestionBank(importedQuestions, importedTitle, { source });
        const sourceLabel = bankSourceLabels[normalizeBankSource(source)];
        const cloudNote = normalizeBankSource(source) === "shared" ? " 注意：当前项目是纯静态网页，纯静态网页不能直接上传云端；其他设备要看到，需要把该 JSON 加入内置题库并重新部署。" : "";
        window.alert(`已导入《${importedTitle}》${importedQuestions.length} 道题，并已加入${sourceLabel}分区。${cloudNote}`);
      } catch (error) {
        window.alert(`导入失败：${error.message}`);
      } finally {
        event.target.value = "";
      }
    });
    document.querySelector("#expandToggle").addEventListener("click", (event) => {
      state.expanded = !state.expanded;
      event.currentTarget.textContent = state.expanded ? "单题作答" : "整体展开";
      saveState();
      renderQuestions();
    });
    document.querySelector("#showAllBtn").addEventListener("click", () => {
      state.missedOnly = false;
      state.activeChapter = "all";
      state.activeCategory = "all";
      state.currentIndex = 0;
      state.query = "";
      els.search.value = "";
      document.querySelector("#focusMissed").textContent = "错题回看";
      saveState();
      renderFilters();
      renderQuestions();
    });
    document.querySelector("#focusMissed").addEventListener("click", (event) => {
      state.missedOnly = !state.missedOnly;
      state.currentIndex = 0;
      event.currentTarget.textContent = state.missedOnly ? "退出错题" : "错题回看";
      saveState();
      renderQuestions();
    });

    async function initializeApp() {
      renderHome();
      try {
        await loadBuiltInBankCatalog();
      } catch (error) {
        els.bankList.innerHTML = `<div class="empty">内置题库加载失败。请检查 site/banks/manifest.json。</div>`;
        return;
      }
      renderHome();
    }

    initializeApp();
  </script>
</body>
</html>
